<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WordWise</title>
<!-- PWA -->
<meta name="theme-color" content="#0D1B2A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WordWise">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="WordWise">
<meta name="description" content="Học từ vựng tiếng Anh offline — miễn phí, không cần internet">
<link rel="manifest" href="manifest.json">
<!-- PWA icons: file PNG thật, thay cho SVG data-URI trước đây để Android/Chrome nhận diện ổn định hơn -->
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D1B2A;--bg2:#0A1520;--bg3:#132233;--bg4:#1A2E42;--border:#1E3347;
  --text:#F0EDE6;--text2:#8FA3B1;--text3:#3A5268;
  --ac:#00C9A7;--a2:#00A389;--red:#FF6B6B;--yel:#FFB347;--pur:#9B7FD4;--blu:#4D9EFF;
  --r:14px;--rs:9px;--sw:218px;--fs:14px;--fsr:1;
}
[data-theme=light]{
  --bg:#EEF4FA;--bg2:#FFFFFF;--bg3:#E4EFF7;--bg4:#D2E3EF;--border:#BDD0DE;
  --text:#0D1B2A;--text2:#3D5A6C;--text3:#92AEBB;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;font-size:var(--fs)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

header{height:50px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:100;flex-shrink:0}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-size:calc(18px * var(--fsr));font-weight:700;color:var(--text);letter-spacing:-.5px}
.logo span{color:var(--ac)}
.hright{margin-left:auto;display:flex;align-items:center;gap:7px}
.streak{display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:20px;font-size:calc(12px * var(--fsr));font-weight:600;color:var(--yel)}
.hbtn{width:30px;height:30px;border-radius:var(--rs);background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:calc(13px * var(--fsr));transition:all .14s}
.hbtn:hover{background:var(--bg4);color:var(--text)}
.fs-ctrl{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.fs-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:3px 7px;font-size:calc(12px * var(--fsr));transition:color .14s;font-family:'Inter',sans-serif}
.fs-btn:hover{color:var(--text)}
.fs-lbl{font-size:calc(10px * var(--fsr));color:var(--text3);min-width:20px;text-align:center}

.app{display:flex;flex:1;overflow:hidden;height:calc(100vh - 50px)}

/* SIDEBAR */
.sb{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;transition:transform .25s}
.sb-sec{padding:10px 10px 8px;border-bottom:1px solid var(--border)}
.sb-sec:last-child{border-bottom:none;flex:1}
.stl{font-size:calc(9px * var(--fsr));font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px;padding:0 4px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--rs);cursor:pointer;color:var(--text2);font-size:calc(12px * var(--fsr));font-weight:500;transition:all .13s;margin-bottom:2px;border:1px solid transparent}
.ni:hover{background:var(--bg3);color:var(--text)}
.ni.active{background:rgba(0,201,167,.1);color:var(--ac);border-color:rgba(0,201,167,.18)}
.ni .ic{font-size:calc(13px * var(--fsr));width:16px;text-align:center;flex-shrink:0}

/* MODE RADIO */
.mr{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:var(--rs);cursor:pointer;border:1px solid var(--border);background:var(--bg3);transition:all .13s;margin-bottom:4px}
.mr:hover{border-color:var(--ac)}
.mr.sel{border-color:var(--ac);background:rgba(0,201,167,.08)}
.rdot{width:13px;height:13px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:all .13s;display:flex;align-items:center;justify-content:center}
.mr.sel .rdot{border-color:var(--ac);background:var(--ac)}
.rdot::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--bg2);display:none}
.mr.sel .rdot::after{display:block}
.ml{font-size:calc(12px * var(--fsr));font-weight:500;flex:1}
.md{font-size:calc(10px * var(--fsr));color:var(--text2)}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:18px 22px}

/* HOME TAB CARDS (nhóm lớn) — compact */
.htabs{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;margin-bottom:16px}
.htab{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:0}
.htab::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border);transition:background .2s}
.htab:hover{border-color:var(--ac);transform:translateY(-1px)}
.htab:hover::before{background:var(--ac)}
.htab.on{border-color:rgba(0,201,167,.5);background:rgba(0,201,167,.07)}
.htab.on::before{background:linear-gradient(90deg,var(--ac),#7FFFED)}
.htab-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.htab-ico{font-size:calc(17px * var(--fsr))}
.htab-name{font-size:calc(12px * var(--fsr));font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.3}
.htab-cnt{font-size:calc(11px * var(--fsr));color:var(--text2)}
.htab-pct{font-size:calc(10px * var(--fsr));color:var(--text3);margin-top:1px}
.htab-rnd{background:rgba(255,179,71,.07);border-color:rgba(255,179,71,.25)}
.htab-rnd:hover{background:rgba(255,179,71,.13);border-color:rgba(255,179,71,.4)}
.htab-rnd::before{background:var(--yel) !important}
.htab-rnd .htab-name{color:var(--yel)}
.htab-rnd .htab-cnt,.htab-rnd .htab-pct{color:rgba(255,179,71,.65)}

/* BRANCH SUMMARY ROW */
.branch-summary{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap;font-size:calc(12px * var(--fsr));color:var(--text2)}
/* ── 2 random cards, now styled as square htab items inside the tab grid ── */
.htab.rnd-grp{background:rgba(0,201,167,.07);border-color:rgba(0,201,167,.35)}
.htab.rnd-grp:hover{background:rgba(0,201,167,.14)}
.htab.rnd-grp .htab-name{color:var(--ac)}
.htab.rnd-mix{background:rgba(77,158,255,.07);border-color:rgba(77,158,255,.35)}
.htab.rnd-mix:hover{background:rgba(77,158,255,.14)}
.htab.rnd-mix .htab-name{color:var(--blu)}
/* ── 2 random buttons inside branch ── */
.rnd2-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.rnd2-btn{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--rs);font-size:calc(12px * var(--fsr));font-weight:600;cursor:pointer;border:1px solid;transition:all .14s;font-family:'Inter',sans-serif;flex:1;justify-content:center;min-width:130px}
.rnd2-btn.rnd-grp{background:rgba(0,201,167,.06);border-color:rgba(0,201,167,.28);color:var(--ac)}
.rnd2-btn.rnd-grp:hover{background:rgba(0,201,167,.14)}
.rnd2-btn.rnd-mix{background:rgba(77,158,255,.06);border-color:rgba(77,158,255,.28);color:var(--blu)}
.rnd2-btn.rnd-mix:hover{background:rgba(77,158,255,.14)}
.rnd-scope{color:var(--yel);border-color:rgba(255,179,71,.3);background:rgba(255,179,71,.08)}
.rnd-scope:hover{background:rgba(255,179,71,.16);color:var(--yel)}
.rnd-banner{display:flex;justify-content:center;margin-bottom:14px}
.rnd-banner-btn{display:flex;align-items:center;gap:8px;padding:9px 22px;border-radius:30px;background:rgba(255,179,71,.1);border:1px solid rgba(255,179,71,.35);color:var(--yel);font-size:calc(13px * var(--fsr));font-weight:600;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.rnd-banner-btn:hover{background:rgba(255,179,71,.2);transform:translateY(-1px)}

/* BRANCH / LEAF GRID — compact */
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
.bcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.bcard:hover{border-color:var(--ac);transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,201,167,.1)}
.bcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac);opacity:0;transition:opacity .15s}
.bcard:hover::before{opacity:1}
.bc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.bc-ico{font-size:calc(16px * var(--fsr))}
/* SVG ring — compact 44px */
.ring-wrap{position:relative;width:44px;height:44px;flex-shrink:0}
.ring-wrap svg{width:44px;height:44px;transform:rotate(-90deg);display:block}
.rb{fill:none;stroke:var(--border);stroke-width:3.5}
.rf{fill:none;stroke:var(--ac);stroke-width:3.5;stroke-linecap:round;transition:stroke-dashoffset .4s}
.rpct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:calc(10px * var(--fsr));font-weight:700;color:var(--ac);font-family:'DM Mono',monospace;pointer-events:none}
.bc-name{font-size:calc(12px * var(--fsr));font-weight:600;color:var(--text);margin-bottom:2px;line-height:1.3}
.bc-cnt{font-size:calc(11px * var(--fsr));color:var(--text2)}
.bc-sub{font-size:calc(10px * var(--fsr));color:var(--text3);margin-top:1px}

/* BREADCRUMB */
.bcrumb{display:flex;align-items:center;gap:5px;margin-bottom:13px;font-size:calc(12px * var(--fsr));color:var(--text2);flex-wrap:wrap}
.bci{cursor:pointer;transition:color .13s}
.bci:hover{color:var(--ac)}
.bcsep{color:var(--text3)}
.bccur{color:var(--text);font-weight:600}

/* LEAF ACTIONS */
.leaf-acts{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.la{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--rs);font-size:calc(13px * var(--fsr));font-weight:600;cursor:pointer;border:1px solid;transition:all .14s;font-family:'Inter',sans-serif}
.la.study{background:rgba(77,158,255,.08);border-color:rgba(77,158,255,.25);color:var(--blu)}
.la.study:hover{background:rgba(77,158,255,.15)}
.la.practice{background:var(--ac);border-color:var(--ac);color:#0D1B2A}
.la.practice:hover{background:var(--a2)}

/* ROOT DETAIL CARD */
.root-info{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:14px}
.root-title{font-family:'DM Mono',monospace;font-size:calc(18px * var(--fsr));font-weight:500;color:var(--ac);margin-bottom:4px}
.root-row{display:flex;gap:8px;font-size:calc(12px * var(--fsr));color:var(--text2);flex-wrap:wrap}
.root-tag{background:var(--bg4);padding:2px 8px;border-radius:20px;font-size:calc(10px * var(--fsr))}

/* WORD STUDY CARDS */
.wsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.wscard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;transition:border-color .13s}
.wscard:hover{border-color:rgba(0,201,167,.25)}
.ws-top{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.ws-word{font-family:'DM Mono',monospace;font-size:calc(15px * var(--fsr));font-weight:500;color:var(--text)}
.ws-ph{font-size:calc(11px * var(--fsr));color:var(--ac)}
.ws-pos{font-size:calc(10px * var(--fsr));padding:2px 7px;border-radius:20px;background:rgba(0,201,167,.1);color:var(--ac);font-weight:600;flex-shrink:0}
.ws-mean{font-size:calc(13px * var(--fsr));font-weight:600;color:var(--text);margin-bottom:4px}
.ws-col{font-size:calc(11px * var(--fsr));color:var(--blu);margin-bottom:3px}
.ws-ex{font-size:calc(11px * var(--fsr));color:var(--text2);font-style:italic;line-height:1.6}
.ws-meta{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.mtag{font-size:calc(10px * var(--fsr));padding:2px 7px;border-radius:20px;background:var(--bg3);color:var(--text2)}
.spk{background:none;border:none;cursor:pointer;color:var(--text3);font-size:calc(13px * var(--fsr));padding:2px;line-height:1;transition:color .13s;flex-shrink:0}
.spk:hover{color:var(--ac)}

/* LEVEL BADGES */
.lv{display:inline-block;padding:2px 7px;border-radius:20px;font-size:calc(10px * var(--fsr));font-weight:700}
.A1{background:rgba(16,185,129,.12);color:#10B981}
.A2{background:rgba(52,211,153,.12);color:#34D399}
.B1{background:rgba(255,179,71,.12);color:var(--yel)}
.B2{background:rgba(255,107,107,.12);color:var(--red)}
.C1{background:rgba(155,127,212,.15);color:var(--pur)}
.C2{background:rgba(155,127,212,.25);color:var(--pur)}

/* GAME */
/* Practice wrapper — cỡ chữ được điều khiển bởi CHUNG 1 biến --fsr (nút A-/A+ ở header),
   không còn dùng riêng --pscale nữa. Vì --fsr là custom property kế thừa từ :root,
   mọi thay đổi ở header sẽ tự động áp dụng xuống đây mà không cần render lại. */
#practice-wrap{font-size:calc(14px * var(--fsr))}
#practice-wrap .q-word{font-size:calc(2.28em)}
#practice-wrap .q-ph,#practice-wrap .q-pos{font-size:0.93em}
#practice-wrap .q-col,#practice-wrap .q-ex{font-size:0.86em}
#practice-wrap .obtn{font-size:0.93em}
#practice-wrap .mitem{font-size:0.86em}
#practice-wrap .tinput{font-size:1em}
#practice-wrap .gstat{font-size:0.86em}
#practice-wrap .sbtn{font-size:1.2em}
#practice-wrap .srow{font-size:0.86em}
.ghdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.pbar{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--ac),#7FFFED);border-radius:3px;transition:width .3s}
.gstat{font-size:calc(12px*var(--fsr));color:var(--text2);white-space:nowrap}
.tdsp{font-family:'DM Mono',monospace;font-size:calc(18px*var(--fsr));font-weight:500;color:var(--yel);min-width:50px;text-align:right}
.tdsp.danger{color:var(--red);animation:blink .5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

.qcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:13px;display:flex;flex-direction:column;align-items:center;text-align:center}
.q-src{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.q-word{font-family:'DM Mono',monospace;font-size:calc(32px*var(--fsr));font-weight:600;color:var(--text);margin-bottom:4px}
.q-ph{font-size:calc(14px*var(--fsr));color:var(--ac);margin-bottom:3px}
.q-pos{font-size:calc(12px*var(--fsr));color:var(--text2);font-style:italic;margin-bottom:6px}
.q-col{font-size:calc(13px*var(--fsr));color:var(--blu);margin-bottom:5px;text-align:center}
.q-ex{font-size:calc(13px*var(--fsr));color:var(--text2);font-style:italic;line-height:1.6;margin-bottom:4px;text-align:center}
.q-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:5px}
.spkbtn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:calc(16px * var(--fsr));padding:3px;line-height:1;transition:color .13s}
.spkbtn:hover{color:var(--ac)}
.srow{display:flex;align-items:center;gap:3px;margin-top:8px}
.sbtn{background:none;border:none;cursor:pointer;font-size:calc(17px*var(--fsr));transition:transform .1s;color:var(--border)}
.sbtn.lit{color:var(--yel)}
.sbtn:hover{transform:scale(1.2)}

/* INFO TOGGLE */
.itogs{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.itog{padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:calc(10px * var(--fsr));font-weight:600;transition:all .13s;font-family:'Inter',sans-serif}
.itog.on{border-color:var(--ac);color:var(--ac);background:rgba(0,201,167,.07)}

/* OPTIONS */
.ogrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:420px;margin:0 auto}
.obtn{padding:11px 14px;border-radius:var(--rs);border:2px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:calc(13px*var(--fsr));font-weight:500;transition:all .13s;text-align:center;font-family:'Inter',sans-serif}
.obtn:hover:not(:disabled){border-color:var(--ac);background:rgba(0,201,167,.07)}
.obtn.correct{border-color:var(--ac)!important;background:rgba(0,201,167,.12)!important;color:var(--ac)}
.obtn.wrong{border-color:var(--red)!important;background:rgba(255,107,107,.1)!important;color:var(--red)}
.obtn:disabled{cursor:default}

/* MATCHING */
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.mcol{display:flex;flex-direction:column;gap:6px}
.mitem{padding:10px 12px;border-radius:var(--rs);border:2px solid var(--border);background:var(--bg3);cursor:pointer;font-size:calc(13px*var(--fsr));font-weight:500;transition:all .13s;text-align:center;line-height:1.4}
.mitem:hover:not(.matched):not(.shake){border-color:var(--ac);background:rgba(0,201,167,.07)}
.mitem.sel{border-color:var(--ac);background:rgba(0,201,167,.14)}
.mitem.matched{border-color:var(--ac);background:rgba(0,201,167,.08);color:var(--ac);cursor:default}
.mitem.shake{border-color:var(--red);background:rgba(255,107,107,.08);animation:shk .3s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* TYPING */
.tinput{width:100%;padding:11px;border-radius:var(--rs);border:2px solid var(--border);background:var(--bg3);color:var(--text);font-size:calc(14px*var(--fsr));font-family:'Inter',sans-serif;outline:none;transition:border-color .13s;margin-top:10px}
.tinput:focus{border-color:var(--ac)}
.tinput.correct{border-color:var(--ac)}
.tinput.wrong{border-color:var(--red)}

/* RESULT */
.rcard{text-align:center;padding:26px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)}
.rscore{font-family:'DM Mono',monospace;font-size:calc(50px * var(--fsr));font-weight:500;color:var(--ac)}
.rlbl{font-size:calc(13px * var(--fsr));color:var(--text2);margin-bottom:16px}
.wlist{background:var(--bg3);border-radius:var(--rs);padding:11px;text-align:left;margin-top:11px;max-height:230px;overflow-y:auto}
.witem{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:calc(12px * var(--fsr))}
.witem:last-child{border-bottom:none}
.wen{font-weight:600;color:var(--red)}
.wvi{color:var(--text2)}

/* DASHBOARD */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:9px;margin-bottom:13px}
.sbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
.snum{font-family:'DM Mono',monospace;font-size:calc(23px * var(--fsr));font-weight:500;color:var(--ac)}
.slbl{font-size:calc(11px * var(--fsr));color:var(--text2);margin-top:3px}
.hmap{display:flex;gap:2px;flex-wrap:wrap;margin-top:6px}

.spi{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;margin-bottom:5px}

.sps.ip{background:rgba(255,179,71,.1);color:var(--yel)}

.spfill{height:100%;background:var(--ac);border-radius:2px}

.httl{font-size:calc(12px * var(--fsr));font-weight:600}

.hscr.good{color:var(--ac)}
.hscr.bad{color:var(--red)}

/* MODAL/SETTINGS */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:900;backdrop-filter:blur(4px)}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:901;width:95%;max-width:480px;max-height:88vh;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)}
.mhdr{padding:15px 18px 0;display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.mttl{font-family:'Bricolage Grotesque',sans-serif;font-size:calc(16px * var(--fsr));font-weight:700}

.srow2:last-child{border-bottom:none}
.tog{width:32px;height:17px;border-radius:9px;border:none;cursor:pointer;position:relative;transition:background .18s;flex-shrink:0}
.tog.on{background:var(--ac)}
.tog.off{background:var(--border)}
.tog::after{content:'';width:13px;height:13px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:left .18s}
.tog.on::after{left:17px}
.tog.off::after{left:2px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.btn-p{padding:8px 16px;background:var(--ac);color:#0D1B2A;border:none;border-radius:var(--rs);cursor:pointer;font-size:calc(13px * var(--fsr));font-weight:600;font-family:'Inter',sans-serif;transition:opacity .13s}

.empty{text-align:center;padding:50px 20px;color:var(--text3)}

.toast{position:fixed;bottom:16px;right:16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:9px 15px;font-size:calc(12px * var(--fsr));font-weight:500;z-index:2000;box-shadow:0 8px 24px rgba(0,0,0,.4);transform:translateY(60px);opacity:0;transition:all .23s}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--ac);color:var(--ac)}

.fi{width:100%;padding:8px 11px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:calc(13px * var(--fsr));font-family:'Inter',sans-serif;outline:none}
.fi:focus{border-color:var(--ac)}

/* ═══════════════════════════════════════════════
   MOBILE RESPONSIVE — full redesign for phones
   ═══════════════════════════════════════════════ */
@media(max-width:720px){
  /* Hide desktop sidebar entirely on mobile */
  .sb{display:none !important}
  /* Full width main */
  .app{flex-direction:column;height:auto;overflow:visible}
  .main{height:auto;overflow:visible;padding:12px 14px 80px}

  header{padding:0 12px;gap:8px;height:48px}

     Trên di động chỉ hiện chữ A−/A+ (ẩn số %) để tiết kiệm diện tích header như yêu cầu. */
  .fs-ctrl{padding:0}
  .fs-btn{padding:5px 8px;font-size:calc(13px * var(--fsr))}
  .fs-lbl{display:none}
  /* Bottom nav bar */
  .bottom-nav{display:flex !important}
  /* htabs grid — 2 cols on mobile */
  .htabs{grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px}
  .htab{padding:9px 10px}
  .htab-name{font-size:calc(11px * var(--fsr))}
  .htab-cnt,.htab-pct{font-size:calc(10px * var(--fsr))}
  /* Branch grid 2 cols */
  .bgrid{grid-template-columns:repeat(2,1fr);gap:7px}
  .bcard{padding:8px 10px}
  /* Quiz options — 1 col on narrow, 2 col on wider mobile */
  .ogrid{grid-template-columns:1fr;max-width:100%;gap:7px}
  /* Matching grid — vẫn giữ 2 cột trên di động (English bên trái, nghĩa bên phải), chỉ giảm khoảng cách cho vừa màn hình hẹp */
  .mgrid{grid-template-columns:1fr 1fr;gap:6px}
  /* Word study grid 1 col */
  .wsgrid{grid-template-columns:1fr}
  /* qcard padding reduce */
  .qcard{padding:16px 14px}
  /* (đã bỏ override .q-word riêng cho mobile — cỡ chữ giờ do #practice-wrap .q-word 2.28em × --fsr quyết định, thống nhất mọi kích thước màn hình) */
  /* Ring smaller on mobile */
  .ring-wrap{width:38px;height:38px}
  .ring-wrap svg{width:38px;height:38px}
  .rpct{font-size:calc(9px * var(--fsr))}
  /* leaf-acts stack */
  .leaf-acts{flex-direction:column;gap:8px}
  .la{justify-content:center}
  /* practice-wrap padding */
  #practice-wrap{padding-bottom:70px}
  /* branch summary stack */
  .branch-summary{flex-direction:column;align-items:flex-start;gap:6px}
  /* modal full width */
  .modal{width:98%;max-width:none;border-radius:var(--r) var(--r) 0 0;bottom:0;top:auto;transform:translateX(-50%)}
}
/* Bottom navigation bar (hidden on desktop) */
.bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:58px;
  background:var(--bg2);
  border-top:1px solid var(--border);

  flex-direction:row;
  align-items:stretch;
}
.bn-item{

  gap:3px;cursor:pointer;color:var(--text3);font-size:calc(10px * var(--fsr));font-weight:500;

  -webkit-tap-highlight-color:transparent;
}
.bn-item.active{color:var(--ac)}
.bn-item .bnico{font-size:calc(20px * var(--fsr));line-height:1}
/* Safe area for notched phones */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .bottom-nav{padding-bottom:env(safe-area-inset-bottom);height:calc(58px + env(safe-area-inset-bottom))}
  @media(max-width:720px){.main{padding-bottom:calc(80px + env(safe-area-inset-bottom))}}
}
/* ── iOS Safari: div click fix ──────────────────────
   iOS Safari does NOT fire click on non-button divs
   unless they have cursor:pointer AND touch-action:manipulation.
   This fixes bcard, htab, mitem, etc. not responding on iPhone. */
.bcard,.htab,.ni,.mr,.mitem,.bn-item,
.rnd-banner-btn,.hitem,.spi,.la,
.bci,.bc-item,.leaf-acts button{
  cursor:pointer;
  -webkit-tap-highlight-color:rgba(0,201,167,.08);
  touch-action:manipulation;
}
/* Remove 300ms tap delay globally on iOS */
*{
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
button,a,.bcard,.htab{touch-action:manipulation}
</style>

<script>
// ══════════════════════════════════════════════════════════════
// STATIC DATA FROM EXCEL SHEETS 2 & 3
// ══════════════════════════════════════════════════════════════
const TOPICS_DATA = [

const ROOTS_DATA = [

  {root:"bene-",origin:"Latin",meaning:"tốt, lợi",examples:"benefit, beneficial, benevolent, beneficiary"},

};

};

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
let DB = {
  words:[], progress:{}, modeProgress:{}, rndQueues:{}, history:[], streak:{count:0,last:''}, act:{}, dailyLog:{},
  settings:{theme:'dark',fs:14,mode:'quiz',showPhonetic:true,showPos:true,showColloc:true,showExample:true,showLevel:true,autoSpeak:true}
};
let G = {mode:null,words:[],queue:[],idx:0,score:0,wrong:[],start:null,ti:null,tsec:0,ml:null,mbatch:[],mmatched:0};
let curTab='grade', curBranch=null, curLeaf=null;

function save(){
  try{
    localStorage.setItem('ww5',JSON.stringify(DB));
  }catch(e){
    // Hết dung lượng lưu trữ (QuotaExceededError) hoặc lỗi khác — báo cho người dùng
    // thay vì âm thầm mất dữ liệu (tiến độ học, sao, v.v. vừa thay đổi sẽ không được lưu).
    console.error('save() failed:',e);
    toast('⚠️ Không lưu được dữ liệu — bộ nhớ thiết bị có thể đã đầy! Hãy xuất sao lưu và xoá bớt dữ liệu cũ.','err');
  }
}
function load(){
  const d=localStorage.getItem('ww5');
  if(d){try{const p=JSON.parse(d);DB={...DB,...p};DB.settings={...DB.settings,...(p.settings||{})};}catch(e){}}
  // Chế độ Flashcard đã bị gỡ bỏ khỏi app — nếu người dùng cũ còn lưu mode='flash', chuyển về Trắc nghiệm.
  if(DB.settings.mode==='flash')DB.settings.mode='quiz';
  upStreak();
}
function ds(d){return d.toISOString().split('T')[0];}
function upStreak(){
  $('sc').textContent=DB.streak.count;
  const t=ds(new Date());if(DB.streak.last===t)return;
  const y=ds(new Date(Date.now()-86400000));
  DB.streak.count=DB.streak.last===y?DB.streak.count+1:1;
  DB.streak.last=t;save();$('sc').textContent=DB.streak.count;
}
function toggleTheme(){DB.settings.theme=DB.settings.theme==='dark'?'light':'dark';applyT();save();}
function applyT(){document.documentElement.setAttribute('data-theme',DB.settings.theme);$('tbtn').textContent=DB.settings.theme==='dark'?'🌙':'☀️';}
function chgFS(d){const cur=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--fs'))||14;const nv=Math.min(22,Math.max(11,cur+d));document.documentElement.style.setProperty('--fs',nv+'px');document.documentElement.style.setProperty('--fsr',(nv/14).toFixed(3));DB.settings.fs=nv;save();const l=$('fslbl');if(l)l.textContent=nv;}
function applyFS(){const nv=DB.settings.fs||14;document.documentElement.style.setProperty('--fs',nv+'px');document.documentElement.style.setProperty('--fsr',(nv/14).toFixed(3));const l=$('fslbl');if(l)l.textContent=nv;}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function fmtT(s){const m=Math.floor(s/60);return m+':'+(s%60<10?'0':'')+(s%60);}
function toast(msg,tp=''){const t=$('toast');t.textContent=msg;t.className='toast show'+(tp?' '+tp:'');setTimeout(()=>t.classList.remove('show'),2400);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
// Stable ID cho 1 từ vựng, sinh từ NỘI DUNG (word+grade+unit+topic+root) thay vì ngẫu nhiên.
// Nhờ vậy khi import lại cùng 1 bộ từ, ID không đổi → tiến độ học (progress/sao) vẫn khớp được với từ cũ.
function wordKey(w){
  return [w.word,w.grade,w.unit,w.topic,w.specialGroup,w.root].map(x=>String(x||'').trim().toLowerCase()).join('|');
}
function stableId(w){
  const s=wordKey(w);
  let h=5381;
  for(let i=0;i<s.length;i++){h=((h<<5)+h+s.charCodeAt(i))|0;}
  return 'w'+(h>>>0).toString(36);
}
// Escape dữ liệu do người dùng import (Excel) trước khi chèn vào innerHTML,
// tránh vỡ giao diện hoặc chèn mã HTML/script nếu file Excel chứa ký tự đặc biệt.
function esc(s){
  return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
// Escape an toàn để chèn vào bên trong chuỗi JS (đặt trong dấu ' ' của onclick="...('...')")
function escJs(s){
  return String(s??'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,'\\n');
}
function dlog(){const k=ds(new Date());DB.act[k]=(DB.act[k]||0)+1;save();}

// ── iOS Safari tap fix ────────────────────────────────────────────────────
// iOS Safari doesn't reliably fire 'click' on divs rendered via innerHTML.
// addTap() listens to touchend (scroll-aware) + click for desktop fallback.
// Replace ALL el.addEventListener('click', fn) in dynamic renders with addTap(el, fn).
function addTap(el,fn){
  if(!el)return;
  const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  if(isTouch){
    // iOS Safari: use touchend to avoid 300ms delay and click-not-firing bug
    let startY=0,moved=false;
    el.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;moved=false;},{passive:true});
    el.addEventListener('touchmove',e=>{if(Math.abs(e.touches[0].clientY-startY)>8)moved=true;},{passive:true});
    el.addEventListener('touchend',e=>{
      if(moved)return;
      e.preventDefault(); // prevent ghost click on iOS
      fn(e);
    },{passive:false});
  }else{
    // Desktop: just use click
    el.addEventListener('click',fn);
  }
}

// ── SPEAK ──────────────────────────────────────────────────────────────────
// speakToken tăng lên mỗi lần dừng/hủy phát âm — dùng để "vô hiệu hóa" mọi chuỗi
// đọc (speakSequence) đang dang dở, tránh trường hợp hủy audio cũ (qua onerror)
// lại vô tình kích hoạt đọc tiếp phần còn lại của từ cũ, chồng lên từ mới.
let speakToken=0;
function stopAutoSpeak(){
  speakToken++;
  if(window.speechSynthesis)speechSynthesis.cancel();
}
// ── Chọn đúng giọng đọc tiếng Anh (fix lỗi iOS Safari) ──────────────────────
// Trên iOS, chỉ đặt utterance.lang='en-US' KHÔNG đủ — Safari thường vẫn dùng giọng
// mặc định của hệ điều hành (vd: giọng tiếng Việt nếu máy đang để ngôn ngữ Việt).
// Phải tìm đúng object SpeechSynthesisVoice tiếng Anh trong danh sách và gán thẳng
// vào utterance.voice thì Safari mới đọc đúng kiểu tiếng Anh.
let _voiceCache=null;
function loadVoices(){
  if(!window.speechSynthesis)return;
  const list=speechSynthesis.getVoices();
  if(list&&list.length)_voiceCache=list;
}
if(window.speechSynthesis){
  loadVoices();
  // Trên iOS/Safari, getVoices() thường trả về mảng rỗng ở lần gọi đầu — danh sách
  // chỉ có sau khi trình duyệt load xong, báo qua sự kiện voiceschanged.
  speechSynthesis.addEventListener('voiceschanged',loadVoices);
}
function pickVoice(lang){
  if(!_voiceCache)loadVoices();
  if(!_voiceCache||!_voiceCache.length)return null;
  const wantBase=(lang||'en-US').split('-')[0].toLowerCase();
  // Ưu tiên: khớp chính xác (en-US) → cùng ngôn ngữ gốc (en-*, ưu tiên giọng "default"/"local") → không tìm được thì null
  return _voiceCache.find(v=>v.lang&&v.lang.toLowerCase()===lang.toLowerCase())
      || _voiceCache.find(v=>v.lang&&v.lang.toLowerCase().startsWith(wantBase+'-')&&v.localService)
      || _voiceCache.find(v=>v.lang&&v.lang.toLowerCase().startsWith(wantBase+'-'))
      || _voiceCache.find(v=>v.lang&&v.lang.toLowerCase().startsWith(wantBase))
      || null;
}
// Phát âm 1 đoạn text riêng lẻ (dùng cho các nút 🔊 bấm tay) — huỷ audio đang phát rồi đọc ngay đoạn này.
function speak(txt,lang='en-US',rate=0.85){
  if(!window.speechSynthesis||!txt)return;
  stopAutoSpeak();
  const u=new SpeechSynthesisUtterance(txt);u.lang=lang;u.rate=rate;
  const v=pickVoice(lang);if(v)u.voice=v;
  speechSynthesis.speak(u);
}
// Đọc lần lượt nhiều đoạn theo thứ tự, đọc xong đoạn này mới sang đoạn kế (dùng onend, không dùng setTimeout
// đoán thời gian) — phát đúng 1 lượt duy nhất rồi dừng, KHÔNG lặp lại. Mỗi lượt gọi mang 1 "token" riêng;
// nếu có lệnh dừng/phát mới xen vào giữa chừng, token cũ không còn khớp nữa nên chuỗi cũ tự dừng hẳn,
// không bao giờ phát đè lên từ đang hiển thị hiện tại.
function speakSequence(parts){
  stopAutoSpeak();
  const myToken=speakToken;
  const queue=(parts||[]).filter(p=>p&&p.text);
  if(!queue.length||!window.speechSynthesis)return;
  let i=0;
  const playNext=()=>{
    if(myToken!==speakToken)return; // đã có lệnh dừng/chuyển từ khác xen vào — bỏ hẳn chuỗi cũ
    if(i>=queue.length)return;
    const p=queue[i++];
    const u=new SpeechSynthesisUtterance(p.text);
    u.lang=p.lang||'en-US';u.rate=p.rate||0.85;
    const v=pickVoice(u.lang);if(v)u.voice=v;
    u.onend=playNext;
    u.onerror=()=>{}; // lỗi (kể cả do bị cancel) KHÔNG được phép tự đọc tiếp phần sau
    speechSynthesis.speak(u);
  };
  playNext();
}
// Tự động đọc khi vừa chuyển sang 1 từ mới: từ vựng → cụm từ đi kèm → ví dụ 1 → ví dụ 2 (đọc 1 lượt rồi dừng).
// fullSeq=false (dùng ở chế độ Thi thử có giới hạn giờ) → chỉ đọc mỗi từ vựng, không đọc cụm từ/ví dụ.
function startAutoSpeak(w,fullSeq=true){
  if(!DB.settings.autoSpeak||!w||!w.word)return;
  const S=DB.settings;
  const parts=[{text:w.word,lang:'en-US',rate:0.85}];
  if(fullSeq){
    if(S.showColloc&&w.collocations)parts.push({text:w.collocations,lang:'en-US',rate:0.8});
    if(S.showExample&&w.ex1)parts.push({text:w.ex1,lang:'en-US',rate:0.8});
    if(S.showExample&&w.ex2)parts.push({text:w.ex2,lang:'en-US',rate:0.8});
  }
  speakSequence(parts);
}

// modeProgress structure: { quiz:{wordId:{seen,correct,wrong,consec}}, type:{...}, ... }
const MODES=['quiz','type','match','mock'];

function getMProg(mode,id){
  if(!DB.modeProgress)DB.modeProgress={};
  if(!DB.modeProgress[mode])DB.modeProgress[mode]={};
  return DB.modeProgress[mode][id]||{seen:0,correct:0,wrong:0,consec:0};
}
function setMProg(mode,id,p){
  if(!DB.modeProgress)DB.modeProgress={};
  if(!DB.modeProgress[mode])DB.modeProgress[mode]={};
  DB.modeProgress[mode][id]=p;
}

// Legacy getProg for stars (stars shared across all modes — no need to separate)
function getProg(id){return DB.progress[id]||{stars:1};}

function markWord(id,ok){
  const mode=G.mode||DB.settings.mode;
  const p=getMProg(mode,id);
  p.seen++;
  if(ok){p.correct++;p.consec=(p.consec||0)+1;}
  else{p.wrong=(p.wrong||0)+1;p.consec=0;}
  setMProg(mode,id,p);
  if(ok)logDaily(id);
  save();dlog();
}

function setStar(id,n,btn){
  const p=getProg(id);p.stars=n;
  DB.progress[id]=p;save();
  btn.parentElement.querySelectorAll('.sbtn').forEach((s,i)=>s.classList.toggle('lit',i<n));
}

// grpPct(words, mode?) — if mode given use that mode's stats, else use current selected mode
function grpPct(words,mode){
  if(!words.length)return 0;
  const m=mode||DB.settings.mode;
  if(!DB.modeProgress||!DB.modeProgress[m])return 0;
  const mp=DB.modeProgress[m];
  return Math.round(words.filter(w=>(mp[w.id]||{}).correct>0).length/words.length*100);
}

// Stars for wib() — still shared
function getStars(id){return(getProg(id).stars)||1;}

// Records a correctly-answered word against today's date
function logDaily(id){
  const k=ds(new Date());
  if(!DB.dailyLog[k])DB.dailyLog[k]=[];
  if(!DB.dailyLog[k].includes(id))DB.dailyLog[k].push(id);
}

function ring(pct){
  const R=16.5;const C=2*Math.PI*R;const off=C-(pct/100)*C;

}

let NAVSTACK=[];
function pushView(fn){NAVSTACK.push(fn);}
function goBack(){
  
  if(NAVSTACK.length<=1){nav('home');return;}
  NAVSTACK.pop();

  if(prev)prev();
}

  return NAVSTACK.length>1?`<button class="btn-s" id="btn-back" style="margin-bottom:12px">← Quay lại</button>`:'';
}

// ANTI-REPEAT RANDOM QUEUE
// Ensures every word is seen before any repeats.
// Separate queues per scope key (e.g. 'grade', 'A1A2', 'Lớp 6', etc.)
// ══════════════════════════════════════════════════════════════
function getRndQueue(key, words){
  if(!DB.rndQueues)DB.rndQueues={};
  const q=DB.rndQueues[key]||[];
  // Remove IDs no longer in words pool
  const validIds=new Set(words.map(w=>w.id));
  const filtered=q.filter(id=>validIds.has(id));
  // If queue has fewer than 20 remaining, refill with a new shuffled batch
  // (excluding words already in queue to avoid immediate repeats)
  if(filtered.length<20){
    const inQueue=new Set(filtered);
    const remaining=shuffle(words.filter(w=>!inQueue.has(w.id)).map(w=>w.id));
    const refilled=[...filtered,...remaining];
    DB.rndQueues[key]=refilled;
    save();
    return refilled;
  }
  return filtered;
}
function consumeRndQueue(key, words, n=20){
  const q=getRndQueue(key,words);
  const take=q.slice(0,n);
  DB.rndQueues[key]=q.slice(n);
  save();
  return words.filter(w=>take.includes(w.id));
}

// ── Random: 1 random sub-group (unit / topic) ─────────────────────────────
// Picks one random sub-group from the pool, uses anti-repeat for group order
function startRandomGroup(scopeKey, words, getSubGroups){
  if(!words.length){toast('Chưa có từ vựng!','err');return;}
  const groups=getSubGroups(words); // [{label,words}]
  if(!groups.length){toast('Không có nhóm nào!','err');return;}
  // Anti-repeat for group order
  const gKey='g_'+scopeKey;
  if(!DB.rndQueues)DB.rndQueues={};
  let gQueue=DB.rndQueues[gKey]||[];
  const validLabels=new Set(groups.map(g=>g.label));
  gQueue=gQueue.filter(l=>validLabels.has(l));
  if(!gQueue.length){
    gQueue=shuffle(groups.map(g=>g.label));
    DB.rndQueues[gKey]=gQueue;save();
  }
  const chosenLabel=gQueue.shift();
  DB.rndQueues[gKey]=gQueue;save();
  const chosen=groups.find(g=>g.label===chosenLabel)||groups[0];
  curLeaf={words:chosen.words,label:`🎯 ${chosen.label} (ngẫu nhiên)`};
  toast(`🎯 Nhóm ngẫu nhiên: ${chosen.label}`,'ok');
  startPractice();
}

// ── Random: 20 mixed words from whole pool (anti-repeat) ─────────────────
function startRandom20(scopeKey, words){
  if(!words.length){toast('Chưa có từ vựng!','err');return;}
  const picked=consumeRndQueue(scopeKey,words,Math.min(20,words.length));
  curLeaf={words:picked,label:`🎲 20 từ ngẫu nhiên (${scopeKey})`};
  toast(`🎲 ${picked.length} từ ngẫu nhiên, không lặp lại!`,'ok');
  startPractice();
}

// ── Sub-group extractors ──────────────────────────────────────────────────
function subgroupsByUnit(words){
  const m={};
  words.forEach(w=>{
    const u=w.unit||'Chung';
    // Ghép cả Lớp vào key để KHÔNG gộp nhầm các Unit trùng số giữa những lớp khác nhau
    // (vd: "Unit 1" của Lớp 6 và "Unit 1" của Lớp 7 phải là 2 nhóm riêng biệt).
    const key=w.grade?`${w.grade} - Unit ${u}`:`Unit ${u}`;
    if(!m[key])m[key]=[];
    m[key].push(w);
  });
  return Object.entries(m).sort((a,b)=>{
    const gradeIdx=k=>{const i=GRADE_ORDER.findIndex(g=>k.startsWith(g+' '));return i<0?99:i;};
    const unitNum=k=>{const mm=k.match(/Unit\s*(\d+)/i);return mm?parseInt(mm[1]):0;};
    const ga=gradeIdx(a[0]),gb=gradeIdx(b[0]);
    if(ga!==gb)return ga-gb;
    return unitNum(a[0])-unitNum(b[0]);
  }).map(([l,ws])=>({label:l,words:ws}));
}
function subgroupsByTopic(words){
  const m={};
  words.forEach(w=>{const t=w.topic||'Khác';if(!m[t])m[t]=[];m[t].push(w);});
  return Object.entries(m).map(([l,ws])=>({label:l,words:ws}));
}
function subgroupsByRoot(words){
  const m={};
  words.forEach(w=>{
    const r=w.root||w.specialGroup;
    if(r){if(!m[r])m[r]=[];m[r].push(w);}
  });
  return Object.entries(m).map(([l,ws])=>({label:l,words:ws}));
}

  const S=DB.settings;const stars=getStars(w.id);

  // để biết từ đang học thuộc lớp/unit/chủ đề nào, kể cả khi luyện tập với bộ từ trộn lẫn nhiều nhóm.
  const srcParts=[];
  if(w.grade)srcParts.push(w.grade);
  if(w.unit)srcParts.push('Unit '+w.unit);
  if(w.topic)srcParts.push(w.topic);
  if(!w.grade&&!w.unit&&(w.specialGroup||w.root))srcParts.push(w.specialGroup||w.root);
  const srcRow=srcParts.length?`<div class="q-src">${srcParts.map(s=>`<span class="mtag">${esc(s)}</span>`).join('')}</div>`:'';
  return`
  ${srcRow}
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
    <div class="q-word">${esc(w.word)}</div>
    <button class="spkbtn" onclick="speak('${escJs(w.word)}')">🔊</button>
    ${w.level?`<span class="lv ${esc(w.level)}">${esc(w.level)}</span>`:''}
  </div>
  ${S.showPhonetic&&w.phonetic?`<div class="q-ph">${esc(w.phonetic)}</div>`:''}
  ${S.showPos&&w.type?`<div class="q-pos">${esc(w.type)}</div>`:''}
  ${S.showColloc&&w.collocations?`<div class="q-col">📌 ${esc(w.collocations)} <button class="spkbtn" onclick="speak('${escJs(w.collocations)}','en-US',0.8)" style="font-size:13px">🔊</button></div>`:''}
  ${S.showExample&&w.ex1?`<div class="q-ex">"${esc(w.ex1)}" <button class="spkbtn" onclick="speak('${escJs(w.ex1)}','en-US',0.8)" style="font-size:13px">🔊</button></div>`:''}
  ${S.showExample&&w.ex2?`<div class="q-ex">"${esc(w.ex2)}" <button class="spkbtn" onclick="speak('${escJs(w.ex2)}','en-US',0.8)" style="font-size:13px">🔊</button></div>`:''}
  <div style="display:flex;align-items:center;gap:6px;margin-top:7px;flex-wrap:wrap">
    <button class="hbtn" style="width:28px;height:24px;font-size:12px" onclick="DB.settings.autoSpeak=!DB.settings.autoSpeak;save();this.textContent=DB.settings.autoSpeak?'🔊':'🔇';if(DB.settings.autoSpeak)startAutoSpeak(G.queue[G.idx]);else stopAutoSpeak()">${DB.settings.autoSpeak?'🔊':'🔇'}</button>
    <div class="itogs">
      ${[['showPhonetic','Phiên âm'],['showColloc','Cụm từ'],['showExample','Ví dụ']].map(([k,l])=>`<button class="itog${S[k]?' on':''}" onclick="DB.settings['${k}']=!DB.settings['${k}'];save();refreshCurrentQ()">${l}</button>`).join('')}
    </div>
  </div>
  <div class="srow">
    <span style="font-size:10px;color:var(--text3);margin-right:3px">Mức nhớ:</span>
    ${[1,2,3,4,5].map(n=>`<button class="sbtn${stars>=n?' lit':''}" onclick="setStar('${w.id}',${n},this)">★</button>`).join('')}
  </div>`;
}

// ── QUIZ ───────────────────────────────────────────────────────────────────
function rQuiz(){
  if(G.idx>=G.queue.length){endG();return;}
  const w=G.queue[G.idx];
  const pool=G.words.length>=4?G.words:DB.words;
  const opts=shuffle([w,...shuffle(pool.filter(x=>x.id!==w.id)).slice(0,3)]);
  startAutoSpeak(w);
  setGameHTML(`
  ${gameHeader()}
  <div class="qcard">${wib(w)}</div>
  <div class="ogrid">${opts.map(o=>`<button class="obtn" onclick="chkQ('${w.id}','${o.id}',this)">${esc(o.meaning)}</button>`).join('')}</div>`);
}
function chkQ(cid,chosen,btn){
  document.querySelectorAll('.obtn').forEach(b=>b.disabled=true);
  const w=G.queue[G.idx];const ok=cid===chosen;
  btn.classList.add(ok?'correct':'wrong');
  if(!ok){document.querySelectorAll('.obtn').forEach(b=>{if(b.textContent===w.meaning)b.classList.add('correct');});G.wrong.push(w);}
  if(ok)G.score++;markWord(w.id,ok);
  setTimeout(()=>{stopAutoSpeak();G.idx++;rQuiz();},1100);
}

// ── TYPING ─────────────────────────────────────────────────────────────────
function rType(){
  if(G.idx>=G.queue.length){endG();return;}
  const w=G.queue[G.idx];
  startAutoSpeak(w);
  setGameHTML(`
  ${gameHeader()}
  <div class="qcard">${wib(w)}</div>
  <input class="tinput" id="ti" placeholder="Gõ nghĩa tiếng Việt rồi nhấn Enter..." autocomplete="off" onkeydown="if(event.key==='Enter')chkT()">
  <div style="margin-top:9px;display:flex;gap:8px">
    <button class="btn-s" onclick="G.wrong.push(G.queue[G.idx]);markWord(G.queue[G.idx].id,false);stopAutoSpeak();G.idx++;rType()">Bỏ qua</button>
    <button class="btn-s" onclick="toast('💡 '+G.queue[G.idx].meaning.slice(0,Math.ceil(G.queue[G.idx].meaning.length/3))+'...')">💡 Gợi ý</button>
  </div>`);
  $('ti').focus();
}
function norm(s){return s.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ');}
function chkT(){
  const inp=$('ti'),w=G.queue[G.idx];inp.disabled=true;
  const ok=norm(inp.value).length>1&&(norm(inp.value).includes(norm(w.meaning.split('/')[0]))||norm(w.meaning).includes(norm(inp.value)));
  inp.classList.add(ok?'correct':'wrong');
  if(!ok)inp.value=`❌ ${inp.value}  →  ✅ ${w.meaning}`;
  if(ok)G.score++;else G.wrong.push(w);markWord(w.id,ok);
  setTimeout(()=>{stopAutoSpeak();G.idx++;rType();},1300);
}

// ── MATCHING ───────────────────────────────────────────────────────────────
function rMatch(){
  const batch=G.words.slice(G.idx,G.idx+8);
  if(!batch.length){endG();return;}
  G.mbatch=batch;G.ml=null;G.mmatched=0;
  const L=shuffle([...batch]),R=shuffle([...batch]);
  setGameHTML(`
  ${gameHeader()}
  <div class="mgrid">
    <div class="mcol">${L.map(w=>`<div class="mitem" data-id="${w.id}" data-s="L" onclick="selM(this);speak('${escJs(w.word)}')">🔊 ${esc(w.word)}</div>`).join('')}</div>
    <div class="mcol">${R.map(w=>`<div class="mitem" data-id="${w.id}" data-s="R" onclick="selM(this)">${esc(w.meaning)}</div>`).join('')}</div>
  </div>`);
}
function selM(el){
  if(el.classList.contains('matched'))return;
  const s=el.dataset.s;
  if(!G.ml){if(s==='L'){document.querySelectorAll('.mitem.sel').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');G.ml=el;}return;}
  if(s==='L'){document.querySelectorAll('.mitem.sel').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');G.ml=el;return;}
  const le=G.ml;G.ml=null;
  if(le.dataset.id===el.dataset.id){
    le.classList.remove('sel');[le,el].forEach(e=>e.classList.add('matched'));
    G.score++;G.idx++;const w=G.mbatch.find(x=>x.id===le.dataset.id);if(w)markWord(w.id,true);
    G.mmatched++;
    const pf=document.querySelector('.pfill');if(pf)pf.style.width=`${(G.idx/G.words.length)*100}%`;
    if(G.mmatched===G.mbatch.length){G.idx>=G.words.length?setTimeout(endG,500):setTimeout(rMatch,600);}
  }else{
    le.classList.remove('sel');[le,el].forEach(e=>{e.classList.add('shake');setTimeout(()=>e.classList.remove('shake'),350);});
    const w=G.mbatch.find(x=>x.id===le.dataset.id);if(w&&!G.wrong.find(x=>x.id===w.id)){G.wrong.push(w);markWord(w.id,false);}
  }
}

// ── MOCK (thi thử, 5s/từ) ─────────────────────────────────────────────────
function rMock(){
  G.tsec=G.queue.length*5;
  rMockQ();
  G.ti=setInterval(()=>{
    G.tsec--;
    const td=$('td');if(td){td.textContent=fmtT(G.tsec);td.className='tdsp'+(G.tsec<=30?' danger':'');}
    if(G.tsec<=0){clearInterval(G.ti);endG(true);}
  },1000);
}
function rMockQ(){
  if(G.idx>=G.queue.length){clearInterval(G.ti);endG();return;}
  const w=G.queue[G.idx];
  const pool=G.words.length>=4?G.words:DB.words;
  const opts=shuffle([w,...shuffle(pool.filter(x=>x.id!==w.id)).slice(0,3)]);
  startAutoSpeak(w,false);
  setGameHTML(`
  <div class="ghdr">
    <div class="pbar"><div class="pfill" style="width:${(G.idx/G.queue.length)*100}%"></div></div>
    <div class="gstat">✅${G.score} ❌${G.wrong.length} · ${G.idx+1}/${G.queue.length}</div>
    <div class="tdsp" id="td">${fmtT(G.tsec)}</div>
  </div>
  <div style="font-size:0.8em;color:var(--text2);margin-bottom:8px">⏱ Thi thử · ${fmtT(G.queue.length*5)} (${G.queue.length} từ × 5s)</div>
  <div class="qcard">${wib(w)}</div>
  <div class="ogrid">${opts.map(o=>`<button class="obtn" onclick="chkM('${w.id}','${o.id}',this)">${esc(o.meaning)}</button>`).join('')}</div>`);
}
function chkM(cid,chosen,btn){
  document.querySelectorAll('.obtn').forEach(b=>b.disabled=true);
  const w=G.queue[G.idx];const ok=cid===chosen;
  btn.classList.add(ok?'correct':'wrong');
  if(!ok){document.querySelectorAll('.obtn').forEach(b=>{if(b.textContent===w.meaning)b.classList.add('correct');});G.wrong.push(w);}
  if(ok)G.score++;markWord(w.id,ok);
  setTimeout(()=>{stopAutoSpeak();G.idx++;rMockQ();},750);
}

// Wraps game content in #practice-wrap — cỡ chữ tự động theo --fsr chung của cả app (nút A-/A+ ở header)
function setGameHTML(html){
  $('mc').innerHTML=`<div id="practice-wrap">${html}</div>`;
}

// ── GAME HEADER ────────────────────────────────────────────────────────────
function gameHeader(){
  const total=G.mode==='match'?G.words.length:G.queue.length;
  return`<div class="ghdr">
    <div class="pbar"><div class="pfill" style="width:${(G.idx/total)*100}%"></div></div>
    <div class="gstat">✅${G.score} ❌${G.wrong.length} · ${G.idx+1}/${total}</div>
  </div>`;
}

// ── END GAME ───────────────────────────────────────────────────────────────
function endG(timeout=false){
  stopAutoSpeak();clearInterval(G.ti);
  
  const total=G.mode==='match'?G.words.length:G.queue.length;
  const pct=Math.round((G.score/Math.max(total,1))*100);
  const dur=Math.round((Date.now()-G.start)/1000);
  const ml={quiz:'Trắc nghiệm',type:'Typing',match:'Ghép cặp',mock:'Thi thử'};
  DB.history.unshift({id:uid(),mode:G.mode,label:curLeaf?.label||'',total,score:G.score,pct,ww:G.wrong.map(w=>w.id),date:new Date().toISOString(),dur});
  if(DB.history.length>100)DB.history.pop();save();
  $('mc').innerHTML=`
  <div class="rcard">
    ${timeout?'<div style="color:var(--red);font-size:13px;margin-bottom:6px">⏰ Hết giờ!</div>':''}
    <div class="rscore">${pct}%</div>
    <div class="rlbl">${G.score}/${total} · ${ml[G.mode]||G.mode} · ${fmtT(dur)}</div>
    <div style="display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-bottom:14px">
      <button class="btn-p" onclick="startPractice()">🔄 Luyện lại</button>
      ${G.wrong.length?`<button class="btn-s" onclick="practiceWrong()">📖 Ôn từ sai (${G.wrong.length})</button>`:''}
      <button class="btn-s" onclick="nav('home')">🏠 Trang chủ</button>
    </div>
    ${G.wrong.length?`<div style="text-align:left">
      <div style="font-size:12px;font-weight:600;margin-bottom:7px;color:var(--text2)">Từ sai:</div>
      <div class="wlist">${G.wrong.map(w=>`<div class="witem"><span class="wen">${esc(w.word)}</span><span class="wvi">${esc(w.meaning)}</span></div>`).join('')}</div>
    </div>`:`<div style="color:var(--ac);font-size:15px;margin-top:6px">🎉 Hoàn hảo!</div>`}
  </div>`;
}
function practiceWrong(){
  if(!G.wrong.length)return;
  const saved=curLeaf;curLeaf={words:G.wrong,label:'Ôn từ sai'};
  G.words=shuffle([...G.wrong]);G.queue=[...G.words];G.idx=0;G.score=0;G.wrong=[];G.start=Date.now();
  if(G.mode==='quiz')rQuiz();else if(G.mode==='type')rType();else if(G.mode==='match')rMatch();else rMock();
  curLeaf=saved;
}

// DASHBOARD
// ══════════════════════════════════════════════════════════════
function rDash(selMode){
  selMode=selMode||DB.settings.dashMode||'quiz';
  DB.settings.dashMode=selMode;save();
  const total=DB.words.length;
  const hcells=[];
  for(let i=89;i>=0;i--){const d=new Date(Date.now()-i*86400000);const v=DB.act[ds(d)]||0;const lv=v===0?0:v<3?1:v<8?2:v<15?3:4;hcells.push(`<div class="hc" data-v="${lv}" title="${ds(d)}: ${v}"></div>`);}
  const gradeMap={};DB.words.forEach(w=>{if(w.grade){if(!gradeMap[w.grade])gradeMap[w.grade]=[];gradeMap[w.grade].push(w);}});

  // ── Per-mode summary boxes ──
  const modeSummary=MODES.map(m=>{
    const mp=DB.modeProgress&&DB.modeProgress[m]||{};
    const learned=DB.words.filter(w=>(mp[w.id]||{}).correct>0).length;
    const pct=total?Math.round(learned/total*100):0;
    return{m,learned,pct};
  });

  // ── Per-mode grade progress (for selected mode) ──
  const selMp=DB.modeProgress&&DB.modeProgress[selMode]||{};
  const selSeen=DB.words.filter(w=>(selMp[w.id]||{}).seen>0).length;
  const selMastered=DB.words.filter(w=>(selMp[w.id]||{}).consec>=3).length;
  const selPct=total?Math.round(selSeen/total*100):0;

  // ── 30-day breakdown ──
  const wordById={};DB.words.forEach(w=>wordById[w.id]=w);
  const days30=[];
  for(let i=29;i>=0;i--){const d=new Date(Date.now()-i*86400000);const k=ds(d);const ids=DB.dailyLog[k]||[];days30.push({date:k,label:d.toLocaleDateString('vi',{day:'2-digit',month:'2-digit'}),count:ids.length,ids});}
  const total30=days30.reduce((a,d)=>a+d.count,0);
  const maxDay=Math.max(1,...days30.map(d=>d.count));
  const allIds30=new Set();days30.forEach(d=>d.ids.forEach(id=>allIds30.add(id)));
  const topicCount30={},levelCount30={};
  allIds30.forEach(id=>{const w=wordById[id];if(!w)return;if(w.topic)topicCount30[w.topic]=(topicCount30[w.topic]||0)+1;if(w.level)levelCount30[w.level]=(levelCount30[w.level]||0)+1;});
  const topTopics=Object.entries(topicCount30).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const levelOrder=['A1','A2','B1','B2','C1','C2'];
  const levelBars=levelOrder.filter(l=>levelCount30[l]).map(l=>[l,levelCount30[l]]);
  const maxTopic=Math.max(1,...topTopics.map(t=>t[1]));
  const maxLevel=Math.max(1,...levelBars.map(l=>l[1]));

  $('mc').innerHTML=`
  <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:700;margin-bottom:14px">📊 Dashboard</div>

  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">🎮 Tiến độ theo chế độ luyện tập</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">
      ${modeSummary.map(({m,learned,pct})=>`
      <div style="background:var(--bg3);border:2px solid ${m===selMode?'var(--ac)':'var(--border)'};border-radius:var(--rs);padding:10px;cursor:pointer;text-align:center;transition:all .14s" onclick="rDash('${m}')">
        <div style="font-size:11px;font-weight:700;color:${m===selMode?'var(--ac)':'var(--text2)'};margin-bottom:5px">${modeLabels[m]}</div>
        <div style="font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:${pct>0?'var(--ac)':'var(--text3)'}">${pct}%</div>
        <div style="font-size:10px;color:var(--text3);margin-top:2px">${learned}/${total} từ</div>
      </div>`).join('')}
    </div>
  </div>

  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:2px">📚 Chi tiết: ${modeLabels[selMode]}</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:10px">${selSeen} đã gặp · ${selMastered} thành thạo (≥3 đúng liên tiếp) · ${selPct}% tiến độ</div>
    ${GRADE_ORDER.filter(g=>gradeMap[g]).map(g=>{
      const ws=gradeMap[g];const sp=grpPct(ws,selMode);
      const learned=ws.filter(w=>(selMp[w.id]||{}).correct>0).length;
      const st=sp===0?['ns','Chưa học']:sp===100?['cp','Xong']:['ip','Đang học'];
      return`<div class="spi"><div class="sph"><span class="spn">${g}</span><span class="sps ${st[0]}">${st[1]}</span></div><div class="spbar"><div class="spfill" style="width:${sp}%"></div></div><div class="spft"><span>${learned}/${ws.length}</span><span>${sp}%</span></div></div>`;
    }).join('')}
  </div>

  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:2px">📅 30 ngày gần nhất (tất cả chế độ)</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:10px">${total30} lượt đúng · ${allIds30.size} từ riêng biệt</div>
    <div class="day30-chart">${days30.map(d=>`<div class="day30-bar-wrap" title="${d.label}: ${d.count}"><div class="day30-bar" style="height:${Math.max(2,(d.count/maxDay)*60)}px"></div></div>`).join('')}</div>
    <div class="day30-labels"><span>${days30[0].label}</span><span>${days30[14].label}</span><span>${days30[29].label}</span></div>
  </div>

  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">📌 Theo chủ đề (30 ngày)</div>
    ${topTopics.length?topTopics.map(([t,c])=>`<div class="bar-row"><span class="bar-label">${t}</span><div class="bar-track"><div class="bar-fill" style="width:${(c/maxTopic)*100}%"></div></div><span class="bar-val">${c}</span></div>`).join(''):'<div style="font-size:12px;color:var(--text3)">Chưa có dữ liệu</div>'}
  </div>

  <div class="card">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">🎓 Theo trình độ CEFR (30 ngày)</div>
    ${levelBars.length?levelBars.map(([l,c])=>`<div class="bar-row"><span class="bar-label"><span class="lv ${l}">${l}</span></span><div class="bar-track"><div class="bar-fill" style="width:${(c/maxLevel)*100}%"></div></div><span class="bar-val">${c}</span></div>`).join(''):'<div style="font-size:12px;color:var(--text3)">Chưa có dữ liệu</div>'}
  </div>

  <div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:8px">🗓 Heatmap 90 ngày</div><div class="hmap">${hcells.join('')}</div><div style="display:flex;gap:4px;align-items:center;margin-top:6px;font-size:10px;color:var(--text3)"><span>Ít</span><div class="hc"></div><div class="hc" data-v="1"></div><div class="hc" data-v="2"></div><div class="hc" data-v="3"></div><div class="hc" data-v="4"></div><span>Nhiều</span></div></div>`;
}

function exportBackup(){
  if(!DB.words.length){toast('Chưa có dữ liệu để backup!','err');return;}
  const data={
    version:2,
    exportDate:new Date().toISOString(),
    words:DB.words,
    progress:DB.progress,
    modeProgress:DB.modeProgress,
    dailyLog:DB.dailyLog,
    history:DB.history,
    streak:DB.streak,
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`WordWise_backup_${ds(new Date()).replace(/-/g,'')}.json`;
  a.click();URL.revokeObjectURL(a.href);
  toast('✅ Đã xuất backup thành công!','ok');
}

function importBackup(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{

// Đọc + chuẩn hoá dữ liệu từ 1 arrayBuffer Excel (dùng chung cho import file & cập nhật từ GitHub)
function parseExcelBuffer(buf){
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets['DATA']||wb.Sheets[wb.SheetNames[0]];
  const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  let hi=0;
  for(let i=0;i<Math.min(5,data.length);i++){if(data[i].some(c=>String(c).match(/từ vựng|word|vocab/i))){hi=i;break;}}
  const hdr=data[hi].map(h=>String(h).toLowerCase().trim());
  const gi=names=>{for(const n of names){const i=hdr.findIndex(h=>h.includes(n));if(i>=0)return i;}return-1;};
  const fi={
    word:gi(['từ vựng','word','vocab','english']),
    phonetic:gi(['phiên âm','phonetic']),
    type:gi(['loại từ','type','pos']),
    collocations:gi(['cụm từ','colloc']),
    ex1:gi(['ví dụ 1','example 1','ví dụ','example']),
    ex2:gi(['ví dụ 2','example 2']),
    meaning:gi(['nghĩa','meaning','vietnamese']),
    level:gi(['cấp độ','level','cefr']),
    grade:gi(['lớp','grade','trình độ']),
    unit:gi(['unit']),
    topic:gi(['chủ đề','topic']),
    specialGroup:gi(['nhóm đặc biệt','special']),
    root:gi(['gốc từ','root']),
  };
  const words=data.slice(hi+1)
    .filter(r=>r[fi.word>=0?fi.word:0]&&String(r[fi.word>=0?fi.word:0]).trim()&&!String(r[0]).startsWith('➕'))
    .map(r=>({
      word:String(r[fi.word>=0?fi.word:0]||'').trim(),
      phonetic:fi.phonetic>=0?String(r[fi.phonetic]||'').trim():'',
      type:fi.type>=0?String(r[fi.type]||'').trim():'',
      collocations:fi.collocations>=0?String(r[fi.collocations]||'').trim():'',
      ex1:fi.ex1>=0?String(r[fi.ex1]||'').trim():'',
      ex2:fi.ex2>=0?String(r[fi.ex2]||'').trim():'',
      meaning:String(r[fi.meaning>=0?fi.meaning:1]||'').trim(),
      level:fi.level>=0?String(r[fi.level]||'').trim():'',
      grade:fi.grade>=0?String(r[fi.grade]||'').trim():'',
      unit:fi.unit>=0?String(r[fi.unit]||'').trim():'',
      topic:fi.topic>=0?String(r[fi.topic]||'').trim():'',
      specialGroup:fi.specialGroup>=0?String(r[fi.specialGroup]||'').trim():'',
      root:fi.root>=0?String(r[fi.root]||'').trim():'',
    })).filter(w=>w.word&&w.meaning);
  // Gán ID ổn định theo nội dung (không random) để import lại vẫn giữ được tiến độ học.
  // Nếu 2 dòng có nội dung giống hệt nhau (trùng key), thêm hậu tố để tránh đè ID.
  const seen={};
  words.forEach(w=>{
    const base=stableId(w);
    const n=(seen[base]=(seen[base]||0)+1);
    w.id=n>1?base+'_'+n:base;
  });
  return words;
}

function importXL(input){
  const file=input.files[0];if(!file)return;
  toast('⏳ Đang đọc file...');
  const r=new FileReader();
  r.onload=e=>{
    try{
      const words=parseExcelBuffer(e.target.result);
      showImportPreview(words,file.name);
    }catch(err){toast('❌ Lỗi đọc file: '+err.message,'err');}
  };
  r.onerror=()=>toast('❌ Không đọc được file!','err');
  r.readAsArrayBuffer(file);input.value='';
}

// CẬP NHẬT TỪ VỰNG TỪ GITHUB — tự tải file Excel mới nhất trong repo về, không cần chuyển file thủ công.
// Repo: dothanhloi20hc/English, nhánh main, file Vocab.xlsx
// ══════════════════════════════════════════════════════════════
const GITHUB_XLSX_URL='https://raw.githubusercontent.com/dothanhloi20hc/English/main/Vocab.xlsx';
function updateFromGitHub(){
  toast('⏳ Đang tải Vocab.xlsx từ GitHub...');
  // Thêm ?t=timestamp để né cache của trình duyệt/CDN, luôn lấy đúng bản mới nhất vừa Commit
  fetch(GITHUB_XLSX_URL+'?t='+Date.now())
    .then(res=>{
      if(!res.ok)throw new Error(res.status===404?'Không tìm thấy file Vocab.xlsx trong repo (kiểm tra lại tên file/tên repo/nhánh)':'Lỗi tải file ('+res.status+')');
      return res.arrayBuffer();
    })
    .then(buf=>{
      const words=parseExcelBuffer(buf);
      showImportPreview(words,'GitHub — dothanhloi20hc/English/Vocab.xlsx');
    })
    .catch(err=>{
      toast('❌ '+(err.message||'Không cập nhật được — kiểm tra kết nối mạng!'),'err');
    });
}

function confirmImport(){
  const words=window._importWords||[];
  if(!words.length){closeMod();return;}
  const opt=document.querySelector('input[name="iopt"]:checked');
  const keepProgress=opt&&opt.value==='keep';
  const oldProg=DB.progress;const oldMP=DB.modeProgress;const oldDL=DB.dailyLog;
  DB.words=words;
  if(keepProgress){DB.progress=oldProg;DB.modeProgress=oldMP;DB.dailyLog=oldDL;}
  else{DB.progress={};DB.modeProgress={};DB.dailyLog={};}
  window._importWords=null;
  save();closeMod();
  toast(`✅ Đã import ${words.length} từ vựng!`,'ok');
  nav('home');
}

// PWA — Service Worker (manifest.json là file tĩnh riêng, xem thẻ <link rel="manifest"> ở <head>)
// ══════════════════════════════════════════════════════════════
function initPWA(){
  // Register Service Worker for offline caching
  if('serviceWorker' in navigator){
    const swCode=`
const CACHE='wordwise-v4';
const SELF=self.location.href;
// Precache thêm font, thư viện xlsx, manifest, icon & Vocab.xlsx ngay từ lúc cài đặt, để app
// tự có sẵn từ vựng (bootstrap) ngay cả khi mở lần sau mà không có mạng.
const PRECACHE=[
  SELF,
  'manifest.json',
  'icon-192.png',
  'icon-512.png',
  'icon-512-maskable.png',
  'https://raw.githubusercontent.com/dothanhloi20hc/English/main/Vocab.xlsx',
  'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
  'https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap'
];
self.addEventListener('install',e=>{
  e.waitUntil(
    caches.open(CACHE).then(c=>Promise.all(
      PRECACHE.map(u=>fetch(u).then(r=>r.ok&&c.put(u,r)).catch(()=>{}))
    ))
  );
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(
    caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
      const clone=res.clone();
      caches.open(CACHE).then(c=>c.put(e.request,clone));
      return res;
    })).catch(()=>caches.match(SELF))
  );
});`;
    try{
      const blob=new Blob([swCode],{type:'application/javascript'});
      const url=URL.createObjectURL(blob);
      navigator.serviceWorker.register(url,{scope:'./'}).then(()=>{
        console.log('WordWise SW registered');
      }).catch(e=>console.log('SW reg failed (normal on file://)'));
    }catch(e){}
  }

  // Show "Add to Home Screen" prompt on Android Chrome
  let deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();deferredPrompt=e;
    // Show install toast after 3s
    setTimeout(()=>{
      if(!localStorage.getItem('ww_installed')){
        const t=$('toast');
        if(t){
          t.innerHTML='📱 <strong>Cài WordWise</strong> lên màn hình chính? <button onclick="installPWA()" style="margin-left:8px;background:var(--ac);color:#0D1B2A;border:none;border-radius:6px;padding:3px 10px;cursor:pointer;font-weight:600">Cài ngay</button>';
          t.className='toast show ok';
          setTimeout(()=>t.classList.remove('show'),8000);
        }
      }
    },3000);
  });
  window.installPWA=function(){
    if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(r=>{if(r.outcome==='accepted')localStorage.setItem('ww_installed','1');deferredPrompt=null;});}
  };
  window.addEventListener('appinstalled',()=>{localStorage.setItem('ww_installed','1');toast('✅ Đã cài WordWise lên màn hình chính!','ok');});
}
